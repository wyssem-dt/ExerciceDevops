name: CI-CD GHCR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Activer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Connexion a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build et push de l image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/wyssem-dt/exercicedevops:latest