name: CI-CD GHCR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Activer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Connexion a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build et push de l image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/wyssem-dt/exercicedevops:latest

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy sur EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            docker pull ghcr.io/wyssem-dt/exercicedevops:latest

            docker stop student-app || true
            docker rm student-app || true

            docker run -d --name student-app -p 3000:3000 \
              -e APP_DB_HOST=172.17.0.1 \
              -e APP_DB_USER=nodeapp \
              -e APP_DB_PASSWORD=student12 \
              -e APP_DB_NAME=STUDENTS \
              -e APP_PORT=3000 \
              --restart always \
              ghcr.io/wyssem-dt/exercicedevops:latest