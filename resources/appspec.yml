version: 0.0
os: linux

files:
  - source: /
    destination: /home/ubuntu/student-app

hooks:
  ApplicationStop:
    - location: scripts/stop_app.sh
      timeout: 300
      runas: root

  BeforeInstall:
    - location: scripts/install_dependencies.sh
      timeout: 900
      runas: root

  ApplicationStart:
    - location: scripts/start_app.sh
      timeout: 600
      runas: root

  ValidateService:
    - location: scripts/validate_service.sh
      timeout: 300
      runas: root